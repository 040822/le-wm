_target_: source.policy.lewm.LeWMPolicy

history_size: ${history_size}
num_preds: ${num_preds}
sigreg_weight: ${loss.sigreg.weight}
optimizer: ${optimizer}

sigreg:
  _target_: source.model.lewm.modules.SIGReg
  knots: ${loss.sigreg.kwargs.knots}
  num_proj: ${loss.sigreg.kwargs.num_proj}

model:
  _target_: source.model.lewm.jepa.JEPA

  encoder:
    _target_: stable_pretraining.backbone.utils.vit_hf
    size: tiny
    patch_size: 14
    image_size: ${img_size}
    pretrained: false
    use_mask_token: false

  predictor:
    _target_: source.model.lewm.modules.ARPredictor
    num_frames: ${history_size}
    input_dim: ${embed_dim}
    hidden_dim: ${embed_dim}
    output_dim: ${embed_dim}
    depth: 6
    heads: 16
    mlp_dim: 2048
    dim_head: 64
    dropout: 0.1
    emb_dropout: 0.0

  action_encoder:
    _target_: source.model.lewm.modules.Embedder
    input_dim: ???
    emb_dim: ${embed_dim}

  projector:
    _target_: source.model.lewm.modules.MLP
    input_dim: ${embed_dim}
    output_dim: ${embed_dim}
    hidden_dim: 2048
    norm_fn:
      _target_: torch.nn.BatchNorm1d
      _partial_: true

  pred_proj:
    _target_: source.model.lewm.modules.MLP
    input_dim: ${embed_dim}
    output_dim: ${embed_dim}
    hidden_dim: 2048
    norm_fn:
      _target_: torch.nn.BatchNorm1d
      _partial_: true
